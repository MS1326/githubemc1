<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>digital colock</title>
    <link rel="stylesheet" href="digital.css">
</head>
<body>
    <h1 id="h1">DIGITAL CLOCK</h1>
    <div class="watch">
        <div id="digital">
            <div class="row">
                <table>
                    <tr>
                        <td><h2>DATE</h2></td>
                        <td><h2>MONTH</h2></td>
                        <td><h2>YEAR</h2></td>
                    </tr>
                    <tr class="tr-2">
                       <td id="date">0</td>
                       <td id="month">0</td>
                       <td id="year">0</td> 
                    </tr>
                </table>
                
            </div>
            <div class="row">
                <p id="p">TIME</p>
                <div id="p-1">
                    <!-- <h5 id="hour"></h5>
                    <span id="span">:</span>
                    <h5 id="minute"></h5>
                    <span id="span">:</span>
                    <h5 id="second"></h5> -->
                </div>
                <div class="time">
                <h1 id="p-2">AM</h1>
                <h1 id="p-3">PM</h1>
            </div>
            </div>
            <div class="row">
                <h4 id="sun">SUNDAY</h4>
                <h4 id="mon">MONDAY</h4>
                <h4 id="tues">TUESDAY</h4>
                <h4 id="wed">WEDNESDAY</h4>
                <h4 id="thurs">THURSDAY</h4>
                <h4 id="fri">FRIDAY</h4>
                <h4 id="satur">SATURDAY</h4>
            </div>
        </div>
    </div>
    <script src="digital.js"></script>
</body>
</html>
